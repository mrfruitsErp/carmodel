# ═══════════════════════════════════════════════════════════════════
#  CarModel ERP — vhost nginx con sicurezza rinforzata
#  Da copiare in /etc/nginx/sites-available/carmodel sul server
# ═══════════════════════════════════════════════════════════════════

# Headers di sicurezza riusabili (definiti una volta, applicati a tutti i vhost)
# Posizionati come variabili map nel http context — vedi nginx.conf

# ─── 1) IP server (default, fallback per host non riconosciuti) ───
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 142.93.99.245 _;
    root /var/www/carmodel/public;
    index index.php;
    client_max_body_size 32M;

    # Blocca accesso a file sensibili
    location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }
    location ~ /(\.env|\.git|composer\.(lock|json)|package\.json|artisan|phpinfo) { deny all; }

    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_read_timeout 120;
        fastcgi_hide_header X-Powered-By;
    }
}

# ─── 2) www.alecar.it → 301 a alecar.it (canonical) ───
server {
    listen 80;
    listen [::]:80;
    server_name www.alecar.it;
    return 301 http://alecar.it$request_uri;
}

# ─── 3) alecar.it → SITO PUBBLICO ───
server {
    listen 80;
    listen [::]:80;
    server_name alecar.it;
    root /var/www/carmodel/public;
    index index.php;
    client_max_body_size 32M;

    # Security headers (forzati per HTTPS dopo redirect certbot)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Compressione
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml application/xml;

    # Blocca file sensibili
    location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }
    location ~ /(\.env|\.git|composer\.(lock|json)|package\.json|artisan) { deny all; }

    # Limita user-agent ovviamente bot
    if ($http_user_agent ~* "(SemrushBot|MJ12bot|AhrefsBot|DotBot|PetalBot|YandexBot|Baiduspider)") {
        return 403;
    }

    # Rate limit base (abusi e flood) — vedi http context per zone
    # limit_req zone=publiclimit burst=20 nodelay;

    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_read_timeout 120;
        fastcgi_hide_header X-Powered-By;
    }

    # Cache asset statici (1 anno)
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|woff2?|ttf|eot|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# ─── 4) app.alecar.it (canonico) + erp.alecar.it (alias) → ERP ───
server {
    listen 80;
    listen [::]:80;
    server_name app.alecar.it erp.alecar.it;
    root /var/www/carmodel/public;
    index index.php;
    client_max_body_size 32M;

    # Security headers — più stringenti per area amministrativa
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    # Blocca file sensibili
    location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }
    location ~ /(\.env|\.git|composer\.(lock|json)|package\.json|artisan) { deny all; }

    # Blocca bot crawler dall'admin
    if ($http_user_agent ~* "(SemrushBot|MJ12bot|AhrefsBot|DotBot|PetalBot|YandexBot|Baiduspider|GPTBot|ChatGPT)") {
        return 403;
    }

    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_read_timeout 120;
        fastcgi_hide_header X-Powered-By;
    }

    # Cache asset
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|woff2?|ttf|eot|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# NOTA: dopo aver applicato questo file, lancia:
#   nginx -t && systemctl reload nginx
#
# Certbot aggiungerà automaticamente i blocchi HTTPS (listen 443 ssl) e gli
# header HSTS quando il certificato è già attivo. Se HSTS non c'è già nei
# blocchi 443, esegui:
#   certbot --nginx --hsts --uir -d alecar.it -d www.alecar.it -d app.alecar.it -d erp.alecar.it --redirect --non-interactive
